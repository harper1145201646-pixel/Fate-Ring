      ];
    }

    function buildFollowUpMessages(originalQuestion, cards, followUpQuestion, history, currentReading) {
      const parsed = parseQuestion(originalQuestion);
      const compactHistory = history.slice(-4).map(item => ({
        question: item.question,
        answer: item.answer.answerSections ? item.answer.answerSections : item.answer
      }));
      return [
        { role: "system", content: aiSystemPrompt() },
        {
          role: "user",
          content: JSON.stringify({
            task: "回答塔罗解读页追问",
            strictRules: [
              "第一段必须直接回答 followUpQuestion，不要重新泛讲三张牌。",
              "必须承接 originalQuestion 和 previousFollowUps，避免重复已经说过的话。",
              "如果追问是行动建议，给出能执行的步骤；如果追问是趋势/结果，给出倾向和判断依据。"
            ],
            outputShape: {
              intent: "追问意图",
              answerSections: [
                { title: "先回答你", body: "直接回答追问" },
                { title: "结合牌来看", body: "用牌解释原因" },
                { title: "具体动作", body: "下一步动作" },
                { title: "判断标准", body: "用户如何观察是否在变好" }
              ]
            },
            originalQuestion,
            parsedQuestion: parsed,
            cards: cardPayload(cards),
            previousReading: currentReading && currentReading.summarySections ? currentReading.summarySections : [],
            previousFollowUps: compactHistory,
            followUpQuestion
          })
        }
      ];
    }

    function withTimeout(promise, ms, controller) {
      let timeoutId;
      const timeout = new Promise((_, reject) => {
        timeoutId = window.setTimeout(() => {
          if (controller) controller.abort();
          reject(new Error("DeepSeek 响应超时，请稍后再试"));
        }, ms);
      });
      return Promise.race([promise, timeout]).finally(() => window.clearTimeout(timeoutId));
    }

    function friendlyApiError(error) {
      const message = error && error.message ? error.message : "DeepSeek 服务暂时不可用";
      if (/Failed to fetch|NetworkError|Load failed/.test(message)) return "网络连接失败，请确认页面服务在线后重试。";
      if (/超时|aborted|AbortError/i.test(message)) return "DeepSeek 响应超时，请稍后点击重新生成。";
      if (/401|API Key|未配置|unauthorized/i.test(message)) return "AI 服务未配置完成，请稍后再试。";
      if (/402|余额|quota|insufficient/i.test(message)) return "AI 服务额度可能不足，请稍后再试。";
      if (/429|rate/i.test(message)) return "请求太频繁了，请等一小会儿再试。";
      if (/5\d\d|503|502|500/.test(message)) return "AI 服务暂时不稳定，请稍后重新生成。";
      return message;
    }

    async function callDeepSeek(messages, options = {}) {
      const settings = aiSettings();
      const attempts = options.retry === false ? 1 : 2;
      let lastError = null;
      for (let attempt = 0; attempt < attempts; attempt += 1) {
        const controller = new AbortController();
        try {
          const response = await withTimeout(fetch("/api/deepseek", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            signal: controller.signal,
            body: JSON.stringify({
              model: settings.model,
              messages,
              temperature: options.temperature ?? 0.46,
              max_tokens: options.maxTokens ?? 3000,
              response_format: { type: "json_object" }
            })
          }), options.timeoutMs || 25000, controller);
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(data.error || `DeepSeek 请求失败：${response.status}`);
          }
          const content = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
          if (!content) throw new Error("DeepSeek 没有返回内容");
          return parseDeepSeekJson(content);
        } catch (error) {
          lastError = error;
          if (attempt === attempts - 1) break;
          await new Promise(resolve => window.setTimeout(resolve, 650));
        }
      }
      throw new Error(friendlyApiError(lastError));
    }

    function parseDeepSeekJson(content) {
      try {
        return JSON.parse(content);
      } catch {
        const jsonMatch = content.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error("DeepSeek 返回内容不是可解析的 JSON");
        return JSON.parse(jsonMatch[0]);
      }
    }

    function normalizeAiReading(aiReading, localReading) {
      const allText = [
        aiReading.oneSentence || "",
        ...(Array.isArray(aiReading.summarySections) ? aiReading.summarySections.map(section => `${section.title || ""}${section.body || ""}`) : []),
        ...(Array.isArray(aiReading.single) ? aiReading.single.flatMap(item => (item.sections || []).map(section => `${section.title || ""}${section.body || ""}`)) : [])
      ].join("");
      if (allText.length < 120) {
        throw new Error("DeepSeek 回答内容过短，请重新抽牌或稍后再试");
      }
      const single = Array.isArray(aiReading.single) && aiReading.single.length === 3
        ? aiReading.single.map((item, index) => ({
          role: item.role || POSITIONS[index],
          title: item.title || `${POSITIONS[index]} · ${selected[index].cn}`,
          sections: Array.isArray(item.sections) && item.sections.length
            ? item.sections.slice(0, 4).map(section => ({
              title: section.title || "解读",
              body: section.body || ""
            }))
            : localReading.single[index].sections
        }))
        : localReading.single;
      const summarySections = Array.isArray(aiReading.summarySections) && aiReading.summarySections.length
        ? aiReading.summarySections.slice(0, 8).map(section => ({
          title: section.title || "解读",
          body: section.body || ""
        }))
        : localReading.summarySections;
      return {
        ...localReading,
        domain: aiReading.domain || localReading.domain,
        single,
        summarySections,
        source: "DeepSeek AI"
      };
    }

    function apiFailureReading(localReading, error) {
      const message = friendlyApiError(error);
      const hint = location.protocol === "file:"
        ? "请使用网页链接打开 Fate Ring。直接打开本地 HTML 文件时，AI 解读和摄像头权限都可能不可用。"
        : "你可以点击下方的「重新生成解读」。如果仍失败，稍后再试通常就能恢复。";
      return {
        ...localReading,
        single: localReading.single.map(item => ({
          ...item,
          sections: [
            {
              title: "AI 解读暂时没有生成",
              body: "牌已经抽好，不需要重新占卜。等服务恢复后，可以直接重新生成这组三张牌的解读。"
            },
            {
              title: "当前状态",
              body: message
            },
            {
              title: "你可以怎么做",
              body: hint
            }
          ]
        })),
        summarySections: [
          {
            title: "AI 解读暂时不可用",
            body: "这一次没有用本地模板冒充回答。你的三张牌会保留在页面上，可以直接重新生成。"
          },
          {
            title: "当前状态",
            body: message
          },
          {
            title: "下一步",
            body: hint
          }
        ],
        source: "DeepSeek 暂不可用",
        aiError: message
      };
    }

    function normalizeAiFollowUp(aiAnswer, localAnswer) {
      if (!Array.isArray(aiAnswer.answerSections) || !aiAnswer.answerSections.length) {
        throw new Error("DeepSeek 追问回答格式不完整");
      }
      return {
        intent: aiAnswer.intent || localAnswer.intent,
        answerSections: aiAnswer.answerSections.slice(0, 5).map(section => ({
          title: section.title || "解读",
          body: section.body || ""
        })),
        source: "DeepSeek AI"
      };
    }

    async function generateReading(question, cards) {
      const localReading = generateLocalReading(question, cards);
      try {
        const aiReading = await callDeepSeek(buildReadingMessages(question, cards, localReading.parsed));
        return normalizeAiReading(aiReading, localReading);
      } catch (error) {
        return apiFailureReading(localReading, error);
      }
    }

    function classifyFollowUp(question) {
      if (/怎么做|怎么办|建议|下一步|行动/.test(question)) return "行动建议";
      if (/会不会|结果|能不能|是否|未来|发展/.test(question)) return "趋势判断";
      if (/他怎么想|她怎么想|对方|想法|态度/.test(question)) return "他人视角";
      if (/风险|注意|小心|问题|阻碍/.test(question)) return "风险提醒";
      return "综合补充";
    }

    function answerFollowUp(originalQuestion, cards, followUpQuestion, history) {
      const parsed = parseQuestion(originalQuestion);
      const intent = classifyFollowUp(followUpQuestion);
      const anchor = cards[history.length % cards.length];
      const direction = orientationText(anchor);
      const directAnswer = {
        "行动建议": parsed.domain === "事业"
          ? `你下一步要围绕「${parsed.target}」做现实推进：确定目标岗位、改简历、扩大信息入口、复盘反馈。不要只重复投递。`
          : "你下一步不要急着做大决定，先做一个能验证局面的具体小动作。",
        "趋势判断": parsed.intent === "时间判断" && parsed.hasTimeRange
          ? `趋势更像是${parsed.timeRange.join(" / ")}里逐步变清楚，而不是一开始就直接落定。关键窗口要看哪一段出现明确反馈。`
          : "这件事不是完全定死的，它会明显受你接下来怎么处理信息和行动节奏影响。",
        "他人视角": "如果从对方或外部视角看，对方更可能先被现实压力和安全感影响，而不是单纯按情绪反应。",
        "风险提醒": "最大的风险不是没有机会，而是你在信息不完整时过早下结论，或者把问题拖到更难处理。",
        "综合补充": "这个追问的重点是帮你把模糊感变具体：你需要知道现在该看什么，而不是继续要一个绝对答案。"
      }[intent];
      return {
        intent,
        answerSections: [
          {
            title: "先回答你",
            body: directAnswer
          },
          {
            title: "结合牌来看",
            body: `这次我用${anchor.cn}${direction}来回应你的追问。${cardDomainMeaning(anchor, parsed.domain)}所以它不是在单独讲牌，而是在回应「${parsed.target}」这件事的关键变量。`
          },
          {
            title: "具体动作",
            body: parsed.domain === "事业"
              ? "这周先做三件事：列出 10 个更匹配的岗位；把简历里最能证明能力的 3 段经历重写；找 1-2 个能提供真实反馈的人看你的投递方向。"
              : "这周先做三件小事：写下你真正想确认的问题；找一个可靠的人或信息源验证现实情况；给自己设一个不超过三天的下一步行动。"
          },
          {
            title: "判断标准",
            body: `如果做完这些之后，你对「${originalQuestion}」的判断更清楚、焦虑更少，那说明你在靠近正确方向；如果你只是更想逃避，就先不要仓促行动。`
          }
        ]
      };
    }

    async function generateFollowUpAnswer(originalQuestion, cards, followUpQuestion, history) {
      const localAnswer = answerFollowUp(originalQuestion, cards, followUpQuestion, history);
      try {
        const aiAnswer = await callDeepSeek(buildFollowUpMessages(originalQuestion, cards, followUpQuestion, history, currentReading));
        return normalizeAiFollowUp(aiAnswer, localAnswer);
      } catch (error) {
        const message = friendlyApiError(error);
        return {
          intent: "DeepSeek 暂不可用",
          answerSections: [
            {
              title: "AI 暂时没有回答追问",
              body: "你的追问已经保留，但这次 AI 服务没有成功返回。"
            },
            {
              title: "当前状态",
              body: message
            },
            {
              title: "你可以怎么做",
              body: location.protocol === "file:"
                ? "请用网页链接打开页面，不要直接打开本地 HTML 文件。"
                : "稍后再问一次，或者先点击重新生成主解读确认 AI 服务是否恢复。"
            }
          ],
          source: "DeepSeek 暂不可用",
          aiError: message
        };
      }
    }

    async function checkApiAvailability() {
      try {
        const controller = new AbortController();
        const response = await withTimeout(fetch("/api/deepseek", {
          method: "GET",
          signal: controller.signal
        }), 6000, controller);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "AI 服务未连接");
        if (data.configured === false) throw new Error("AI 服务未配置完成");
        return true;
      } catch (error) {
        if (!currentQuestion) {
          questionHint.textContent = friendlyApiError(error);
        }
        return false;
      }
    }

    function checkRuntimeEnvironment() {
      const isLocal = ["localhost", "127.0.0.1", ""].includes(location.hostname);
      const isSecure = location.protocol === "https:" || isLocal;
      if (location.protocol === "file:") {
        questionHint.textContent = "请使用网页链接打开 Fate Ring，直接打开 HTML 文件时 AI 和摄像头可能不可用。";
        return;
      }
      if (!isSecure) {
        questionHint.textContent = "当前不是 HTTPS 页面，浏览器可能会阻止摄像头手势识别。";
      }
      checkApiAvailability();
    }

    function renderAnswerSections(sections) {
      return sections.map(section => `
        <div class="answer-section">
          <strong>${escapeHtml(section.title)}</strong>
          <p>${escapeHtml(section.body)}</p>
        </div>
      `).join("");
    }

    function renderFollowUpHistory() {
      if (!readingHistory.length) {
        followUpList.innerHTML = `<div class="followup-empty">你可以继续追问，例如“我下一步该怎么做？”或“这件事最大的风险是什么？”</div>`;
        return;
      }
      followUpList.innerHTML = readingHistory.map(item => `
        <article class="followup-message user">
          <div class="followup-speaker">你的追问</div>
          <p>${escapeHtml(item.question)}</p>
        </article>
        <article class="followup-message">
          <div class="followup-speaker">命运之轮</div>
          ${renderAnswerSections(item.answer.answerSections)}
        </article>
      `).join("");
      followUpList.scrollTop = followUpList.scrollHeight;
    }

    function renderReadingQuestion() {
      readingQuestion.classList.add("active");
      if (!currentReading) {
        readingQuestion.innerHTML = `<span class="question-label">原始问题 · 生成中</span>${escapeHtml(currentQuestion)}<span class="ai-badge">DeepSeek</span>`;
        return;
      }
      readingQuestion.innerHTML = `<span class="question-label">原始问题 · ${escapeHtml(currentReading.domain)}</span>${escapeHtml(currentQuestion)}<span class="ai-badge${currentReading.aiError ? " warning" : ""}">${escapeHtml(currentReading.source || "DeepSeek AI")}</span>${currentReading.aiError ? `<span class="ai-badge warning">可重新生成</span>` : ""}`;
    }

    function renderSelectedReadingCards() {
      readingCards.innerHTML = "";
      selected.forEach((card, index) => {
        const role = POSITIONS[index];
        const cardEl = document.createElement("article");
        cardEl.className = "reading-card";
        cardEl.innerHTML = `
          <img src="${imagePath(card)}" alt="${card.cn}" style="transform:${card.reversed ? "rotate(180deg)" : "none"}">
          <div>
            <div class="reading-role">${role}</div>
            <div class="reading-name">${card.cn}</div>
            <div class="reading-en">${card.en}</div>
            <span class="badge">${card.reversed ? "逆位" : "正位"}</span>
          </div>
        `;
        readingCards.appendChild(cardEl);
      });
    }

    function renderReadingLoading() {
      currentReading = null;
      renderReadingQuestion();
      readingBlocks.innerHTML = "";
      summaryBlock.innerHTML = `
        <h2>整体解读</h2>
        <div class="answer-section">
          <strong>正在生成</strong>
          <p>正在连接 DeepSeek，把你的问题、三张牌、正逆位和牌位一起交给 AI 解读...</p>
        </div>
      `;
      regenerateBtn.classList.remove("visible");
      regenerateBtn.disabled = true;
    }

    function renderReadingResult() {
      renderReadingQuestion();
      regenerateBtn.classList.toggle("visible", Boolean(currentReading && currentReading.aiError));
      regenerateBtn.disabled = false;
      readingBlocks.innerHTML = "";
      selected.forEach((card, index) => {
        const reading = currentReading.single[index];
        const block = document.createElement("article");
        block.className = "reading-block";
        block.innerHTML = `
          <h2>${escapeHtml(reading.title)}</h2>
          ${renderAnswerSections(reading.sections)}
        `;
        readingBlocks.appendChild(block);
      });
      summaryBlock.innerHTML = `
        <h2>整体解读</h2>
        ${renderAnswerSections(currentReading.summarySections)}
      `;
      renderFollowUpHistory();
    }

    async function loadCurrentReading() {
      renderReadingLoading();
      currentReading = await generateReading(currentQuestion, selected);
      renderReadingResult();
    }

    async function showReading() {
      if (gestureActive) stopGestureMode();
      selectScreen.classList.remove("active");
      readingScreen.classList.add("active");
      renderSelectedReadingCards();
      await loadCurrentReading();
    }

    function resetReading() {
      selected = [];
      currentQuestion = "";
      questionDomain = "通用";
      readingHistory = [];
      currentReading = null;
      rotation = 0;
      velocity = 0;
      cancelGestureHold();
      selectScreen.classList.add("active");
      readingScreen.classList.remove("active");
      questionInput.value = "";
      followUpInput.value = "";
      questionHint.textContent = "请先写下你想询问的主题，命运之轮才会开始回应。";
      readingQuestion.classList.remove("active");
      readingQuestion.innerHTML = "";
      followUpList.innerHTML = "";
      regenerateBtn.classList.remove("visible");
      regenerateBtn.disabled = false;
      updateQuestionGate();
      renderSlots();
      renderRing();
      startGestureMode();
    }

    async function toggleFullscreen() {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    }

    function drawParticlePlaceholder() {
      const ctx = particleCanvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      particleCanvas.width = window.innerWidth * dpr;
      particleCanvas.height = window.innerHeight * dpr;
      particleCanvas.style.width = `${window.innerWidth}px`;
      particleCanvas.style.height = `${window.innerHeight}px`;
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      for (let i = 0; i < 86; i += 1) {
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight;
        const r = Math.random() * 1.7 + 0.4;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = i % 3 === 0 ? "rgba(212,175,55,.52)" : "rgba(202,175,255,.22)";
        ctx.fill();
      }
    }

    function setGestureStatus(text, tracking = false) {
      gestureStatus.textContent = text;
      gesturePanel.classList.toggle("tracking", tracking);
    }

    function resizeGestureOverlay() {
      const rect = gestureOverlay.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.round(rect.width * dpr));
      const height = Math.max(1, Math.round(rect.height * dpr));
      if (gestureOverlay.width !== width || gestureOverlay.height !== height) {
        gestureOverlay.width = width;
        gestureOverlay.height = height;
      }
      gestureOverlayCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { width: rect.width, height: rect.height };
    }

    function clearGestureOverlay() {
      const { width, height } = resizeGestureOverlay();
      gestureOverlayCtx.clearRect(0, 0, width, height);
    }

    function drawGestureLandmarks(hand, highlighted = false) {
      const { width, height } = resizeGestureOverlay();
      gestureOverlayCtx.clearRect(0, 0, width, height);
      const lineColor = highlighted ? "rgba(255, 255, 255, 0.94)" : "rgba(255, 255, 255, 0.68)";
      const pointColor = highlighted ? "rgba(255, 255, 255, 0.96)" : "rgba(255, 255, 255, 0.82)";

      gestureOverlayCtx.lineWidth = highlighted ? 1.9 : 1.25;
      gestureOverlayCtx.lineCap = "round";
      gestureOverlayCtx.lineJoin = "round";
      gestureOverlayCtx.strokeStyle = lineColor;
      gestureOverlayCtx.shadowColor = "rgba(255, 255, 255, 0.24)";
      gestureOverlayCtx.shadowBlur = highlighted ? 8 : 4;

      HAND_CONNECTIONS.forEach(([from, to]) => {
        const a = hand[from];
        const b = hand[to];
        gestureOverlayCtx.beginPath();
        gestureOverlayCtx.moveTo(a.x * width, a.y * height);
        gestureOverlayCtx.lineTo(b.x * width, b.y * height);
        gestureOverlayCtx.stroke();
      });

      hand.forEach((point, index) => {
        const isTip = [4, 8, 12, 16, 20].includes(index);
        const radius = highlighted || isTip ? 2.7 : 2.15;
        gestureOverlayCtx.beginPath();
        gestureOverlayCtx.fillStyle = pointColor;
        gestureOverlayCtx.arc(point.x * width, point.y * height, radius, 0, Math.PI * 2);
        gestureOverlayCtx.fill();
      });

      gestureOverlayCtx.shadowBlur = 0;
    }

    function landmarkDistance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function isFingerCurled(tip, pip) {
      return tip.y > pip.y + 0.012;
    }

    function getFocusedCardEl() {
      return ring.children[focusedIndex] || null;
    }

    function cancelGestureHold() {
      if (gestureSelectingEl) gestureSelectingEl.classList.remove("holding");
      gestureSelectingEl = null;
      gestureSelectingIndex = null;
      gestureHoldStart = 0;
    }

    function handleGestureSelect(now) {
      if (!currentQuestion) {
        setGestureStatus("请先输入问题", false);
        cancelGestureHold();
        return;
      }
      if (now < gestureCooldownUntil || selected.length >= 3) return;
      const el = getFocusedCardEl();
      if (!el || el.classList.contains("selected")) return;
      if (gestureSelectingEl !== el) {
        cancelGestureHold();
        gestureSelectingEl = el;
        gestureSelectingIndex = focusedIndex;
        gestureHoldStart = now;
        velocity = 0;
        el.classList.add("holding");
      }
      if (now - gestureHoldStart >= CONFIG.holdMs) {
        chooseCard(gestureSelectingIndex, el);
        gestureCooldownUntil = now + 900;
      }
    }

    function onGestureResults(results) {
      if (!gestureActive) return;
      const hand = results.multiHandLandmarks && results.multiHandLandmarks[0];
      const now = performance.now();
      if (!hand) {
        gestureLastX = null;
        cancelGestureHold();
        clearGestureOverlay();
        setGestureStatus("未检测到手", false);
        return;
      }

      const palmX = (hand[0].x + hand[5].x + hand[9].x + hand[13].x + hand[17].x) / 5;
      const pinch = landmarkDistance(hand[4], hand[8]) < 0.065;
      const curledCount = [
        isFingerCurled(hand[8], hand[6]),
        isFingerCurled(hand[12], hand[10]),
        isFingerCurled(hand[16], hand[14]),
        isFingerCurled(hand[20], hand[18])
      ].filter(Boolean).length;
      const closedPose = pinch || curledCount >= 3;
      drawGestureLandmarks(hand, closedPose);

      if (gestureLastX !== null) {
        const dx = palmX - gestureLastX;
        const dt = Math.max(now - gestureLastAt, 16);
        if (Math.abs(dx) > 0.004 && !closedPose) {
          const delta = -dx * CONFIG.gestureSensitivity;
          rotation += delta;
          velocity = (delta * 16) / dt;
          updateRing();
          cancelGestureHold();
          setGestureStatus("滑动中", true);
        } else if (closedPose) {
          velocity = 0;
          setGestureStatus(currentQuestion ? "保持手势选牌" : "请先输入问题", Boolean(currentQuestion));
          handleGestureSelect(now);
        } else {
          cancelGestureHold();
          setGestureStatus("手势就绪", true);
        }
      } else {
        setGestureStatus("手势就绪", true);
      }

      gestureLastX = palmX;
      gestureLastAt = now;
    }

    async function startGestureMode() {
      gesturePanel.classList.add("active");
      if (!window.Hands || !window.Camera) {
        setGestureStatus("MediaPipe加载失败", false);
        gestureActive = false;
        return;
      }

      gestureActive = true;
      setGestureStatus("正在开启摄像头", false);

      if (!hands) {
        hands = new Hands({
          locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
          maxNumHands: 1,
          modelComplexity: 1,
          minDetectionConfidence: 0.68,
          minTrackingConfidence: 0.62
        });
        hands.onResults(onGestureResults);
      }

      if (!camera) {
        camera = new Camera(gestureVideo, {
          width: 360,
          height: 270,
          onFrame: async () => {
            if (gestureActive) await hands.send({ image: gestureVideo });
          }
        });
      }

      try {
        await camera.start();
        setGestureStatus("手势就绪", false);
      } catch (error) {
        gestureActive = false;
        setGestureStatus("摄像头不可用", false);
      }
    }

    function stopGestureMode() {
      gestureActive = false;
      gestureLastX = null;
      cancelGestureHold();
      clearGestureOverlay();
      setGestureStatus("手势未开启", false);
      if (gestureVideo.srcObject) {
        gestureVideo.srcObject.getTracks().forEach(track => track.stop());
        gestureVideo.srcObject = null;
      }
      camera = null;
    }
    questionInput.addEventListener("input", () => {
      startReadingBtn.disabled = questionInput.value.trim().length === 0;
      if (!currentQuestion) {
        questionHint.textContent = questionInput.value.trim()
          ? "写好后点击开始占卜，牌阵会根据这个问题解读。"
          : "请先写下你想询问的主题，命运之轮才会开始回应。";
      }
    });

    questionForm.addEventListener("submit", event => {
      event.preventDefault();
      const question = questionInput.value.trim();
      if (!question) {
        questionHint.textContent = "问题不能为空。";
        questionInput.focus();
        return;
      }
      beginQuestionReading(question);
    });

    followUpForm.addEventListener("submit", async event => {
      event.preventDefault();
      const followUpQuestion = followUpInput.value.trim();
      if (!followUpQuestion || !currentQuestion || !selected.length || aiBusy) return;
      rememberRecentQuestion(followUpQuestion);
      aiBusy = true;
      const submitBtn = followUpForm.querySelector("button");
      submitBtn.disabled = true;
      const pendingItem = {
        question: followUpQuestion,
        answer: {
          answerSections: [
            { title: "正在生成", body: "正在连接 DeepSeek 回答你的追问..." }
          ]
        }
      };
      readingHistory.push(pendingItem);
      followUpInput.value = "";
      renderFollowUpHistory();
      const answer = await generateFollowUpAnswer(currentQuestion, selected, followUpQuestion, readingHistory.slice(0, -1));
      pendingItem.answer = answer;
      aiBusy = false;
      submitBtn.disabled = false;
      renderFollowUpHistory();
    });

    clearHistoryBtn.addEventListener("click", clearRecentQuestions);
    fullscreenBtn.addEventListener("click", toggleFullscreen);
    readingFullscreenBtn.addEventListener("click", toggleFullscreen);
    regenerateBtn.addEventListener("click", () => {
      if (!currentQuestion || selected.length !== 3 || aiBusy) return;
      loadCurrentReading();
    });
    resetBtn.addEventListener("click", resetReading);
    window.addEventListener("resize", () => {
      drawParticlePlaceholder();
      clearGestureOverlay();
    });

    renderSlots();
    renderRing();
    updateQuestionGate();
    renderRecentQuestionOptions();
    renderFollowUpHistory();
    drawParticlePlaceholder();
    clearGestureOverlay();
    checkRuntimeEnvironment();
    animate();
    startGestureMode();
  </script>
</body>
</html>
